<!DOCTYPE html>
<html>
<head>
    <title>☁️ Мое Облако</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #5a67d8;
        }
        .files {
            margin-top: 30px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 10px 0;
        }
        .file-actions button {
            width: auto;
            padding: 8px 15px;
            margin: 0 5px;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .storage-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .telegram-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0088cc;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,136,204,0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="telegram-btn" onclick="window.open('https://t.me/error_08081', '_blank')">
        📱 Поддержка
    </button>

    <div class="container">
        <h1>☁️ Мое Облако</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Вход</div>
            <div class="tab" onclick="showTab('register')">Регистрация</div>
        </div>

        <div id="loginForm" class="form active">
            <input type="text" id="loginUser" placeholder="Логин">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>

        <div id="registerForm" class="form">
            <input type="text" id="regUser" placeholder="Логин">
            <input type="password" id="regPass" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>

        <div id="userArea" style="display:none;">
            <div class="user-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="avatar" id="userAvatar"></div>
                    <h2 id="userName"></h2>
                </div>
                <button onclick="logout()" style="width: auto; background: #dc3545;">Выйти</button>
            </div>
            
            <div style="margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Использовано: <span id="usedSpace">0</span> MB</span>
                    <span>Всего: 500 MB</span>
                </div>
                <div class="storage-bar">
                    <div class="storage-fill" id="storageFill" style="width:0%"></div>
                </div>
            </div>
            
            <input type="file" id="fileInput" multiple onchange="uploadFiles()">
            
            <div id="filesList" class="files"></div>
        </div>
    </div>

    <script>
        // Простое хранилище в браузере
        let users = JSON.parse(localStorage.getItem('cloud_users')) || [];
        let currentUser = null;
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function register() {
            let username = document.getElementById('regUser').value;
            let password = document.getElementById('regPass').value;
            
            if(!username || !password) {
                alert('Заполни все поля!');
                return;
            }
            
            // Проверяем есть ли пользователь
            let existing = users.find(u => u.username === username);
            
            if(existing) {
                alert('Логин уже занят!');
                return;
            }
            
            // Создаем пользователя
            let user = {
                id: Date.now(),
                username: username,
                password: password,
                files: []
            };
            
            users.push(user);
            localStorage.setItem('cloud_users', JSON.stringify(users));
            
            currentUser = user;
            showUserArea();
        }

        function login() {
            let username = document.getElementById('loginUser').value;
            let password = document.getElementById('loginPass').value;
            
            currentUser = users.find(u => u.username === username && u.password === password);
            
            if(currentUser) {
                showUserArea();
            } else {
                alert('Неверный логин или пароль!');
            }
        }

        function showUserArea() {
            document.querySelector('.tabs').style.display = 'none';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('userArea').style.display = 'block';
            
            document.getElementById('userName').innerText = currentUser.username;
            document.getElementById('userAvatar').innerText = currentUser.username[0].toUpperCase();
            
            showFiles();
            updateStorage();
        }

        function logout() {
            currentUser = null;
            document.querySelector('.tabs').style.display = 'flex';
            document.getElementById('userArea').style.display = 'none';
            document.getElementById('loginForm').classList.add('active');
        }

        function showFiles() {
            let html = '';
            if(currentUser.files && currentUser.files.length > 0) {
                currentUser.files.forEach((file, index) => {
                    html += `
                        <div class="file-item">
                            <span>📄 ${file.name}</span>
                            <span>${(file.size / 1024).toFixed(1)} KB</span>
                            <div class="file-actions">
                                <button onclick="downloadFile(${index})">📥</button>
                                <button onclick="deleteFile(${index})" style="background:#dc3545;">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html = '<p style="text-align:center; color:#999;">Нет файлов</p>';
            }
            document.getElementById('filesList').innerHTML = html;
        }

        function uploadFiles() {
            let files = document.getElementById('fileInput').files;
            
            for(let file of files) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    if(!currentUser.files) currentUser.files = [];
                    
                    currentUser.files.push({
                        name: file.name,
                        size: file.size,
                        data: e.target.result,
                        date: Date.now()
                    });
                    
                    // Обновляем в массиве
                    let index = users.findIndex(u => u.id === currentUser.id);
                    users[index] = currentUser;
                    localStorage.setItem('cloud_users', JSON.stringify(users));
                    
                    showFiles();
                    updateStorage();
                };
                reader.readAsDataURL(file);
            }
        }

        function downloadFile(index) {
            let a = document.createElement('a');
            a.href = currentUser.files[index].data;
            a.download = currentUser.files[index].name;
            a.click();
        }

        function deleteFile(index) {
            if(confirm('Удалить файл?')) {
                currentUser.files.splice(index, 1);
                
                let userIndex = users.findIndex(u => u.id === currentUser.id);
                users[userIndex] = currentUser;
                localStorage.setItem('cloud_users', JSON.stringify(users));
                
                showFiles();
                updateStorage();
            }
        }

        function updateStorage() {
            let totalSize = 0;
            if(currentUser && currentUser.files) {
                currentUser.files.forEach(f => totalSize += (f.size || 0));
            }
            
            let percent = (totalSize / (500 * 1024 * 1024)) * 100;
            document.getElementById('storageFill').style.width = percent + '%';
            document.getElementById('usedSpace').innerText = (totalSize / (1024*1024)).toFixed(2);
        }
    </script>
</body>
</html>
