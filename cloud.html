<!DOCTYPE html>
<html>
<head>
    <title>☁️ Быстрое Облако</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Загружаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            position: relative;
        }
        button:hover {
            background: #5a67d8;
        }
        button:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .files {
            margin-top: 30px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 10px 0;
        }
        .file-actions button {
            width: auto;
            padding: 8px 15px;
            margin: 0 5px;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .storage-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .telegram-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0088cc;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,136,204,0.3);
            z-index: 1000;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        .quick-login {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .quick-login button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <button class="telegram-btn" onclick="window.open('https://t.me/error_08081', '_blank')">
        📱 Поддержка
    </button>

    <div class="container">
        <h1>☁️ Быстрое Облако</h1>
        
        <script>
            // ⚡ ТВОИ КЛЮЧИ ⚡
            const SUPABASE_URL = 'https://rlehpdgxctnwkrvhmars.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZWhwZGd4Y3Rud2tydmhtYXJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTk3NTcsImV4cCI6MjA4OTM3NTc1N30.6CUxdi5yEDa8bEyw7JBmvjvEwN5pjC3eZptVsijTSQg';
            
            // Создаем клиент Supabase
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // Кэш для пользователей
            let usersCache = {};
        </script>

        <div id="messageArea"></div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Вход</div>
            <div class="tab" onclick="showTab('register')">Регистрация</div>
        </div>

        <div id="loginForm" class="form active">
            <input type="text" id="loginUser" placeholder="Логин">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button id="loginBtn" onclick="login()">🚀 Быстрый вход</button>
            
            <!-- Быстрые тестовые аккаунты -->
            <div class="quick-login">
                <button onclick="quickLogin('user1', '123')">user1</button>
                <button onclick="quickLogin('user2', '123')">user2</button>
                <button onclick="quickLogin('test', '123')">test</button>
            </div>
        </div>

        <div id="registerForm" class="form">
            <input type="text" id="regUser" placeholder="Логин">
            <input type="password" id="regPass" placeholder="Пароль">
            <button id="registerBtn" onclick="register()">✨ Быстрая регистрация</button>
        </div>

        <div id="userArea" style="display:none;">
            <div class="user-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="avatar" id="userAvatar"></div>
                    <h2 id="userName"></h2>
                </div>
                <button onclick="logout()" style="width: auto; background: #dc3545;">🚪 Выйти</button>
            </div>
            
            <div style="margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>💾 Использовано: <span id="usedSpace">0</span> MB</span>
                    <span>📦 Всего: 500 MB</span>
                </div>
                <div class="storage-bar">
                    <div class="storage-fill" id="storageFill" style="width:0%"></div>
                </div>
            </div>
            
            <input type="file" id="fileInput" multiple onchange="uploadFiles()">
            
            <div id="filesList" class="files"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        function showMessage(text, type) {
            document.getElementById('messageArea').innerHTML = 
                `<div class="${type}-message">${text}</div>`;
            setTimeout(() => {
                document.getElementById('messageArea').innerHTML = '';
            }, 3000);
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function quickLogin(username, password) {
            document.getElementById('loginUser').value = username;
            document.getElementById('loginPass').value = password;
            login();
        }

        async function register() {
            let username = document.getElementById('regUser').value;
            let password = document.getElementById('regPass').value;
            
            if(!username || !password) {
                showMessage('❌ Заполни все поля!', 'error');
                return;
            }
            
            let btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Регистрация... <span class="loader"></span>';
            
            try {
                // Проверка кэша
                if(usersCache[username]) {
                    showMessage('❌ Логин уже занят!', 'error');
                    return;
                }
                
                // Проверяем в базе
                let { data: existing } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .limit(1);
                
                if(existing && existing.length > 0) {
                    showMessage('❌ Логин уже занят!', 'error');
                    return;
                }
                
                // Создаем пользователя
                let { data, error } = await supabase
                    .from('users')
                    .insert([{ username, password, files: [] }])
                    .select();
                
                if(error) throw error;
                
                if(data && data.length > 0) {
                    currentUser = data[0];
                    usersCache[username] = currentUser;
                    showUserArea();
                    showMessage('✅ Регистрация успешна!', 'success');
                }
                
            } catch(err) {
                showMessage('❌ Ошибка: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✨ Быстрая регистрация';
            }
        }

        async function login() {
            let username = document.getElementById('loginUser').value;
            let password = document.getElementById('loginPass').value;
            
            let btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Вход... <span class="loader"></span>';
            
            try {
                // Проверка кэша
                if(usersCache[username] && usersCache[username].password === password) {
                    currentUser = usersCache[username];
                    showUserArea();
                    showMessage('🚀 Быстрый вход!', 'success');
                    return;
                }
                
                // Ищем в базе
                let { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .limit(1);
                
                if(error) throw error;
                
                if(!data || data.length === 0) {
                    showMessage('❌ Неверный логин или пароль!', 'error');
                    return;
                }
                
                currentUser = data[0];
                usersCache[username] = currentUser; // Сохраняем в кэш
                showUserArea();
                showMessage('🚀 Добро пожаловать!', 'success');
                
            } catch(err) {
                showMessage('❌ Ошибка: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Быстрый вход';
            }
        }

        function showUserArea() {
            document.querySelector('.tabs').style.display = 'none';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('userArea').style.display = 'block';
            
            document.getElementById('userName').innerText = currentUser.username;
            document.getElementById('userAvatar').innerText = currentUser.username[0].toUpperCase();
            
            showFiles();
            updateStorage();
        }

        function logout() {
            currentUser = null;
            document.querySelector('.tabs').style.display = 'flex';
            document.getElementById('userArea').style.display = 'none';
            document.getElementById('loginForm').classList.add('active');
            showMessage('👋 До свидания!', 'success');
        }

        async function showFiles() {
            if(!currentUser) return;
            
            let { data } = await supabase
                .from('users')
                .select('files')
                .eq('id', currentUser.id)
                .single();
            
            if(data) {
                currentUser.files = data.files || [];
            }
            
            let html = '';
            if(currentUser.files && currentUser.files.length > 0) {
                currentUser.files.forEach((file, index) => {
                    html += `
                        <div class="file-item">
                            <span>📄 ${file.name}</span>
                            <span>${(file.size / 1024).toFixed(1)} KB</span>
                            <div class="file-actions">
                                <button onclick="downloadFile(${index})">📥</button>
                                <button onclick="deleteFile(${index})" style="background:#dc3545;">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html = '<p style="text-align:center; color:#999;">📁 Нет файлов</p>';
            }
            document.getElementById('filesList').innerHTML = html;
            updateStorage();
        }

        async function uploadFiles() {
            let files = document.getElementById('fileInput').files;
            
            for(let file of files) {
                let reader = new FileReader();
                reader.onload = async function(e) {
                    if(!currentUser.files) currentUser.files = [];
                    
                    currentUser.files.push({
                        name: file.name,
                        size: file.size,
                        data: e.target.result,
                        date: Date.now()
                    });
                    
                    await supabase
                        .from('users')
                        .update({ files: currentUser.files })
                        .eq('id', currentUser.id);
                    
                    showFiles();
                };
                reader.readAsDataURL(file);
            }
            showMessage('✅ Файлы загружены!', 'success');
        }

        function downloadFile(index) {
            let a = document.createElement('a');
            a.href = currentUser.files[index].data;
            a.download = currentUser.files[index].name;
            a.click();
        }

        async function deleteFile(index) {
            if(confirm('Удалить файл?')) {
                currentUser.files.splice(index, 1);
                
                await supabase
                    .from('users')
                    .update({ files: currentUser.files })
                    .eq('id', currentUser.id);
                
                showFiles();
                showMessage('🗑️ Файл удален', 'success');
            }
        }

        function updateStorage() {
            let totalSize = 0;
            if(currentUser && currentUser.files) {
                currentUser.files.forEach(f => totalSize += (f.size || 0));
            }
            
            let percent = (totalSize / (500 * 1024 * 1024)) * 100;
            document.getElementById('storageFill').style.width = percent + '%';
            document.getElementById('usedSpace').innerText = (totalSize / (1024*1024)).toFixed(2);
        }
    </script>
</body>
</html>
