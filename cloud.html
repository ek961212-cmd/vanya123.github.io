<!DOCTYPE html>
<html>
<head>
    <title>☁️ Мое Облако</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #5a67d8;
        }
        .files {
            margin-top: 30px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 10px 0;
        }
        .file-actions button {
            width: auto;
            padding: 8px 15px;
            margin: 0 5px;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .storage-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .telegram-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0088cc;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,136,204,0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="telegram-btn" onclick="window.open('https://t.me/error_08081', '_blank')">
        📱 Поддержка
    </button>

    <div class="container">
        <h1>☁️ Мое Облако</h1>
        
        <script>
            // ⚡ ТВОИ КЛЮЧИ ⚡
            const SUPABASE_URL = 'https://rlehpdgxctnwkrvhmars.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_vMhfE_-WtwnFa4jwqhrm6Q_g2WYmv-6';
            
            const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        </script>

        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Вход</div>
            <div class="tab" onclick="showTab('register')">Регистрация</div>
        </div>

        <div id="loginForm" class="form active">
            <input type="text" id="loginUser" placeholder="Логин">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>

        <div id="registerForm" class="form">
            <input type="text" id="regUser" placeholder="Логин">
            <input type="password" id="regPass" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>

        <div id="userArea" style="display:none;">
            <div class="user-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="avatar" id="userAvatar"></div>
                    <h2 id="userName"></h2>
                </div>
                <button onclick="logout()" style="width: auto; background: #dc3545;">Выйти</button>
            </div>
            
            <div style="margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Использовано: <span id="usedSpace">0</span> MB</span>
                    <span>Всего: 500 MB</span>
                </div>
                <div class="storage-bar">
                    <div class="storage-fill" id="storageFill" style="width:0%"></div>
                </div>
            </div>
            
            <input type="file" id="fileInput" multiple onchange="uploadFiles()">
            
            <div id="filesList" class="files"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        async function register() {
            let username = document.getElementById('regUser').value;
            let password = document.getElementById('regPass').value;
            
            if(!username || !password) {
                alert('Заполни все поля!');
                return;
            }
            
            try {
                // Проверяем есть ли пользователь
                let { data: existing, error: checkError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username);
                
                if(checkError) {
                    alert('Ошибка: ' + checkError.message);
                    return;
                }
                
                if(existing && existing.length > 0) {
                    alert('Логин уже занят!');
                    return;
                }
                
                // Создаем пользователя
                let { data, error } = await supabase
                    .from('users')
                    .insert([
                        { 
                            username: username, 
                            password: password, 
                            files: [] 
                        }
                    ])
                    .select();
                
                if(error) {
                    alert('Ошибка: ' + error.message);
                    return;
                }
                
                currentUser = data[0];
                showUserArea();
                alert('Регистрация успешна!');
                
            } catch(err) {
                alert('Ошибка: ' + err.message);
            }
        }

        async function login() {
            let username = document.getElementById('loginUser').value;
            let password = document.getElementById('loginPass').value;
            
            try {
                let { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password);
                
                if(error) {
                    alert('Ошибка: ' + error.message);
                    return;
                }
                
                if(!data || data.length === 0) {
                    alert('Неверный логин или пароль!');
                    return;
                }
                
                currentUser = data[0];
                showUserArea();
                alert('Вход выполнен!');
                
            } catch(err) {
                alert('Ошибка: ' + err.message);
            }
        }

        function showUserArea() {
            document.querySelector('.tabs').style.display = 'none';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('userArea').style.display = 'block';
            
            document.getElementById('userName').innerText = currentUser.username;
            document.getElementById('userAvatar').innerText = currentUser.username[0].toUpperCase();
            
            showFiles();
            updateStorage();
        }

        function logout() {
            currentUser = null;
            document.querySelector('.tabs').style.display = 'flex';
            document.getElementById('userArea').style.display = 'none';
            document.getElementById('loginForm').classList.add('active');
        }

        async function showFiles() {
            let { data, error } = await supabase
                .from('users')
                .select('files')
                .eq('id', currentUser.id)
                .single();
            
            if(data) {
                currentUser.files = data.files || [];
            }
            
            let html = '';
            if(currentUser.files && currentUser.files.length > 0) {
                currentUser.files.forEach((file, index) => {
                    html += `
                        <div class="file-item">
                            <span>📄 ${file.name}</span>
                            <span>${(file.size / 1024).toFixed(1)} KB</span>
                            <div class="file-actions">
                                <button onclick="downloadFile(${index})">📥</button>
                                <button onclick="deleteFile(${index})" style="background:#dc3545;">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html = '<p style="text-align:center; color:#999;">Нет файлов</p>';
            }
            document.getElementById('filesList').innerHTML = html;
            updateStorage();
        }

        async function uploadFiles() {
            let files = document.getElementById('fileInput').files;
            
            for(let file of files) {
                let reader = new FileReader();
                reader.onload = async function(e) {
                    if(!currentUser.files) currentUser.files = [];
                    
                    currentUser.files.push({
                        name: file.name,
                        size: file.size,
                        data: e.target.result,
                        date: Date.now()
                    });
                    
                    let { error } = await supabase
                        .from('users')
                        .update({ files: currentUser.files })
                        .eq('id', currentUser.id);
                    
                    if(error) {
                        alert('Ошибка загрузки: ' + error.message);
                    } else {
                        showFiles();
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function downloadFile(index) {
            let a = document.createElement('a');
            a.href = currentUser.files[index].data;
            a.download = currentUser.files[index].name;
            a.click();
        }

        async function deleteFile(index) {
            if(confirm('Удалить файл?')) {
                currentUser.files.splice(index, 1);
                
                let { error } = await supabase
                    .from('users')
                    .update({ files: currentUser.files })
                    .eq('id', currentUser.id);
                
                if(error) {
                    alert('Ошибка удаления: ' + error.message);
                } else {
                    showFiles();
                }
            }
        }

        function updateStorage() {
            let totalSize = 0;
            if(currentUser && currentUser.files) {
                currentUser.files.forEach(f => totalSize += (f.size || 0));
            }
            
            let percent = (totalSize / (500 * 1024 * 1024)) * 100;
            document.getElementById('storageFill').style.width = percent + '%';
            document.getElementById('usedSpace').innerText = (totalSize / (1024*1024)).toFixed(2);
        }
    </script>
</body>
</html>
